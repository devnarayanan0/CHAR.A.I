<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHAR.AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f7f4;
      --surface: #ffffff;
      --surface-2: #f2f0eb;
      --border: #e5e2da;
      --border-2: #d0cdc4;
      --text-1: #1a1917;
      --text-2: #6b6860;
      --text-3: #a09d98;
      --accent: #1a1917;
      --accent-fg: #ffffff;
      --green-bg: #edfaf3;
      --green-border: #a7e3c4;
      --green-text: #1a6b44;
      --green-dot: #22c069;
      --blue-dot: #3b82f6;
      --radius-sm: 6px;
      --radius-md: 9px;
      --radius-lg: 13px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Topbar ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-1);
      text-decoration: none;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { display: block; }

    .nav { display: flex; gap: 3px; }

    .nav-btn {
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-2);
      transition: background 0.12s, color 0.12s;
    }

    .nav-btn:hover { background: var(--surface-2); color: var(--text-1); }
    .nav-btn.active { background: var(--accent); color: var(--accent-fg); }

    /* ── Main ── */
    .main { max-width: 880px; margin: 0 auto; padding: 2.5rem 2rem; }

    .page { display: none; }
    .page.active { display: block; }

    .page-header { margin-bottom: 2rem; }
    .page-header h2 { font-size: 17px; font-weight: 600; color: var(--text-1); }
    .page-header p { margin-top: 5px; font-size: 13px; color: var(--text-2); }

    code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 4px;
      color: var(--text-1);
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
    }

    /* ── Action row ── */
    .action-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 1.5rem;
    }

    .run-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .run-btn:hover { opacity: 0.82; }
    .run-btn:disabled { opacity: 0.38; cursor: not-allowed; }

    .spinner {
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .state-label { font-size: 13px; color: var(--text-3); }

    /* ── Success banner ── */
    .banner-success {
      display: none;
      align-items: center;
      gap: 9px;
      margin-bottom: 1.5rem;
      padding: 10px 14px;
      background: var(--green-bg);
      border: 1px solid var(--green-border);
      border-radius: var(--radius-md);
      font-size: 13px;
      color: var(--green-text);
    }

    .banner-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green-dot);
      flex-shrink: 0;
    }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }

    /* ── Metrics ── */
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

    .metric {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
    }

    .metric-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-3);
      margin-bottom: 10px;
    }

    .metric-value {
      font-size: 26px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.02em;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-3);
      flex-shrink: 0;
    }

    .status-dot.running {
      background: var(--blue-dot);
      animation: pulse 1.1s ease-in-out infinite;
    }

    .status-dot.done { background: var(--green-dot); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    thead { background: var(--surface-2); }

    th {
      padding: 10px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-3);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 11px 16px;
      color: var(--text-1);
      border-bottom: 1px solid var(--border);
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #faf9f6; }

    .empty-cell {
      text-align: center;
      color: var(--text-3);
      padding: 3rem 1rem !important;
      font-size: 13px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
    }

    .pill-green {
      background: var(--green-bg);
      color: var(--green-text);
      border: 1px solid var(--green-border);
    }

    .pill-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green-dot);
    }

    /* ── Avatar ── */
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      margin-right: 9px;
      vertical-align: middle;
    }

    .user-cell { display: flex; align-items: center; }
  </style>
</head>
<body>

<div class="topbar">
  <a class="logo" href="#">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="2" width="5" height="5" rx="1.2" fill="white" opacity="0.95"/>
        <rect x="9" y="2" width="5" height="5" rx="1.2" fill="white" opacity="0.5"/>
        <rect x="2" y="9" width="5" height="5" rx="1.2" fill="white" opacity="0.5"/>
        <rect x="9" y="9" width="5" height="5" rx="1.2" fill="white" opacity="0.95"/>
      </svg>
    </div>
    CHAR.AI
  </a>
  <nav class="nav">
    <button class="nav-btn active" id="nav-ingestion">Ingestion</button>
    <button class="nav-btn" id="nav-activity">Logs</button>
  </nav>
</div>

<main class="main">

  <!-- Ingestion Page -->
  <section class="page active" id="page-ingestion">
    <div class="page-header">
      <h2>Data ingestion</h2>
      <p>Push documents from the local <code>data/</code> folder into Pinecone.</p>
    </div>

    <div class="card">
      <div class="action-row">
        <button class="run-btn" id="run-ingestion">
          <span class="spinner" id="ingestion-spinner"></span>
          Run ingestion
        </button>
        <span class="state-label" id="ingestion-state">Ready to run</span>
      </div>

      <div class="banner-success" id="ingestion-success">
        <span class="banner-dot"></span>
        Embeddings complete — data successfully pushed to vector database.
      </div>

      <div class="divider"></div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Processed files</div>
          <div class="metric-value" id="processed-files">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Uploaded chunks</div>
          <div class="metric-value" id="uploaded-chunks">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Status</div>
          <div class="metric-value">
            <div class="status-row">
              <span class="status-dot" id="status-dot"></span>
              <span class="status-text" id="ingestion-status">Idle</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Logs Page -->
  <section class="page" id="page-activity">
    <div class="page-header">
      <h2>Logs</h2>
      <p>Recent login activity from the system.</p>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Login time</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="activity-table">
          <tr>
            <td class="empty-cell" colspan="3">Loading logs…</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

</main>

<script src="/static/app.js"></script>

</body>
</html>
